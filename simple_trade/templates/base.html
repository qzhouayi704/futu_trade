<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}富途量化交易系统{% endblock %}</title>
    
    <!-- 主题初始化脚本（避免 FOUC） -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    
    <!-- 本地 vendor 资源 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/font-awesome/css/all.min.css') }}">
    
    <!-- 基础样式和通用组件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
    
    <!-- 页面专用样式 -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="main-nav">
        <div class="nav-brand">
            <span class="brand-icon">📈</span>
            <span class="brand-text">富途量化交易系统</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_home %}{% endblock %}">
                <span class="nav-icon">🏠</span>
                <span>策略监控</span>
            </a>
            <a href="/stock-pool" class="nav-link {% block nav_stock_pool %}{% endblock %}">
                <span class="nav-icon">📋</span>
                <span>股票池管理</span>
            </a>
            <a href="/stock-pool-monitor" class="nav-link {% block nav_stock_pool_monitor %}{% endblock %}">
                <span class="nav-icon">🔥</span>
                <span>股票池监控</span>
            </a>
            <a href="/trading" class="nav-link {% block nav_trading %}{% endblock %}">
                <span class="nav-icon">💹</span>
                <span>自动交易</span>
            </a>
            <a href="/conditions" class="nav-link {% block nav_conditions %}{% endblock %}">
                <span class="nav-icon">📊</span>
                <span>交易条件</span>
            </a>
            <a href="/config" class="nav-link {% block nav_config %}{% endblock %}">
                <span class="nav-icon">⚙️</span>
                <span>系统设置</span>
            </a>
        </div>
        <div class="nav-status">
            <span id="connection-status" class="status-indicator disconnected">
                <span class="status-dot"></span>
                <span class="status-text">未连接</span>
            </span>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 通用脚本 -->
    <!-- Bootstrap JS -->
    <script src="{{ url_for('static', filename='vendor/bootstrap/bootstrap.bundle.min.js') }}"></script>
    <!-- Socket.IO 客户端 - 使用本地文件加载，避免 CDN 访问问题 -->
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    <script>
        // 检查 Socket.IO 是否已加载
        window.addEventListener('load', function() {
            if (typeof io === 'undefined') {
                console.error('Socket.IO 未能加载，实时功能不可用');
                // 显示错误提示
                var status = document.getElementById('connection-status');
                if (status) {
                    status.className = 'status-indicator error';
                    status.querySelector('.status-text').textContent = 'Socket.IO未加载';
                }
            } else {
                console.log('Socket.IO 已加载，版本: ' + (io.version || '4.7.2'));
            }
        });
    </script>
    <script src="{{ url_for('static', filename='common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
