{% extends "base.html" %}

{% block title %}K线图 - {{ stock_code }}{% endblock %}

{% block extra_css %}
<!-- ECharts 图表库 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
/* K线图页面专用样式 */
.kline-page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
}

/* 页面头部 */
.kline-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
}

.back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    color: #fff;
    text-decoration: none;
}

/* 股票信息卡片 */
.stock-info-card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    color: #fff;
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    min-width: 300px;
}

.stock-info-left {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.stock-code-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
}

.stock-name-subtitle {
    font-size: 0.95rem;
    opacity: 0.9;
    margin: 0;
}

.stock-info-right {
    text-align: right;
}

.current-price {
    font-size: 2rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.2;
}

.price-change {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
}

.price-change.up {
    color: #a8e6cf;
}

.price-change.down {
    color: #ffb3b3;
}

/* K线图容器 */
.kline-chart-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    margin-bottom: 1.5rem;
    overflow: hidden;
}

.chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: linear-gradient(135deg, #2c3e50 0%, #3d5a73 100%);
    color: #fff;
}

.chart-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
}

.period-selector {
    display: flex;
    gap: 0.5rem;
}

.period-btn {
    padding: 0.4rem 0.8rem;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s ease;
}

.period-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}

.period-btn.active {
    background: rgba(255, 255, 255, 0.3);
    font-weight: 600;
}

#kline-chart {
    width: 100%;
    height: 550px;
}

/* 交易记录卡片 */
.trade-records-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}

.trade-records-header {
    padding: 1rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.trade-records-header h3 {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
}

.trade-records-list {
    padding: 1rem;
    max-height: 300px;
    overflow-y: auto;
}

.trade-record-item {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    transition: all 0.2s ease;
}

.trade-record-item:last-child {
    margin-bottom: 0;
}

.trade-record-item.buy {
    background: linear-gradient(135deg, rgba(40, 167, 69, 0.1) 0%, rgba(40, 167, 69, 0.05) 100%);
    border-left: 4px solid #28a745;
}

.trade-record-item.sell {
    background: linear-gradient(135deg, rgba(220, 53, 69, 0.1) 0%, rgba(220, 53, 69, 0.05) 100%);
    border-left: 4px solid #dc3545;
}

.trade-record-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    margin-right: 1rem;
    flex-shrink: 0;
}

.trade-record-item.buy .trade-record-icon {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    color: #fff;
}

.trade-record-item.sell .trade-record-icon {
    background: linear-gradient(135deg, #dc3545 0%, #e74c3c 100%);
    color: #fff;
}

.trade-record-info {
    flex: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.trade-record-date {
    font-weight: 600;
    color: #1a1a2e;
    font-size: 0.95rem;
}

.trade-record-type {
    font-size: 0.8rem;
    color: #6c757d;
    margin-top: 0.15rem;
}

.trade-record-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a2e;
}

.trade-records-empty {
    padding: 2rem;
    text-align: center;
    color: #6c757d;
}

.trade-records-empty i {
    font-size: 2.5rem;
    opacity: 0.5;
    margin-bottom: 0.75rem;
}

/* 加载状态 */
.loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    color: #6c757d;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(102, 126, 234, 0.2);
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* 错误状态 */
.error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    color: #dc3545;
}

.error-state i {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.7;
}

/* 响应式 */
@media (max-width: 768px) {
    .kline-page {
        padding: 1rem;
    }
    
    .kline-header {
        flex-direction: column;
        align-items: stretch;
    }
    
    .stock-info-card {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
    }
    
    .stock-info-right {
        text-align: center;
    }
    
    #kline-chart {
        height: 400px;
    }
    
    .period-selector {
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .chart-header {
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="kline-page">
    <!-- 页面头部 -->
    <div class="kline-header">
        <button class="back-btn" onclick="history.back()">
            <span>←</span>
            <span>返回</span>
        </button>
        
        <div class="stock-info-card" id="stock-info-card">
            <div class="stock-info-left">
                <h1 class="stock-code-title" id="stock-code">{{ stock_code }}</h1>
                <p class="stock-name-subtitle" id="stock-name">加载中...</p>
            </div>
            <div class="stock-info-right">
                <p class="current-price" id="current-price">--</p>
                <p class="price-change" id="price-change">
                    <span id="price-change-value">--</span>
                    <span id="change-rate-value">(--%)</span>
                </p>
            </div>
        </div>
    </div>
    
    <!-- K线图卡片 -->
    <div class="kline-chart-card">
        <div class="chart-header">
            <h2>📈 日K线图</h2>
            <div class="period-selector">
                <button class="period-btn" data-days="30">30天</button>
                <button class="period-btn active" data-days="60">60天</button>
                <button class="period-btn" data-days="90">90天</button>
                <button class="period-btn" data-days="180">半年</button>
            </div>
        </div>
        <div id="kline-chart">
            <div class="loading-state" id="chart-loading">
                <div class="loading-spinner"></div>
                <span>正在加载K线数据...</span>
            </div>
        </div>
    </div>
    
    <!-- 交易记录卡片 -->
    <div class="trade-records-card">
        <div class="trade-records-header">
            <h3>💰 交易记录</h3>
        </div>
        <div class="trade-records-list" id="trade-records-list">
            <div class="trade-records-empty" id="trade-records-empty">
                <div>📋</div>
                <p>暂无交易记录</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 股票代码从模板传入
const stockCode = '{{ stock_code }}';
</script>
<script src="{{ url_for('static', filename='kline.js') }}"></script>
{% endblock %}
